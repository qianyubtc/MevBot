name: Release Electron App

on:
  push:
    tags:
      - 'app-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            out_ext: dmg
          - os: windows-latest
            platform: win
            out_ext: exe
          - os: ubuntu-latest
            platform: linux
            out_ext: AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build runner bundle first
      - name: Install runner deps
        working-directory: runner
        run: npm ci

      - name: Bundle runner
        working-directory: runner
        run: npx esbuild src/index.ts --bundle --platform=node --target=node20 --format=cjs --outfile=dist-cjs/bundle.js

      # Sync version from git tag (app-v0.2.3 → 0.2.3)
      - name: Set version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. app-v0.2.3
          VERSION="${TAG#app-v}"             # strip "app-v" prefix → 0.2.3
          echo "Building version: $VERSION"
          # Patch package.json in-place without npm version (avoids git commit)
          node -e "
            const fs = require('fs');
            const p = 'runner-app/package.json';
            const pkg = JSON.parse(fs.readFileSync(p,'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          "

      # Build Electron app
      - name: Install app deps
        working-directory: runner-app
        run: npm ci

      - name: Copy runner bundle
        run: cp runner/dist-cjs/bundle.js runner-app/assets/runner-bundle.js

      - name: Compile TypeScript
        working-directory: runner-app
        run: npx tsc

      - name: Package Electron app
        working-directory: runner-app
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            runner-app/dist/*.dmg
            runner-app/dist/*.exe
            runner-app/dist/*.AppImage
