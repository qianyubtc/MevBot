<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEV Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0b0e; color: #e2e8f0; font-family: 'Inter', sans-serif; }

    .titlebar {
      height: 38px;
      background: #111318;
      border-bottom: 1px solid #1e2230;
      display: flex;
      align-items: center;
      padding: 0 16px;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .titlebar-left { display: flex; align-items: center; gap: 8px; padding-left: 72px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #00d4aa; animation: pulse 2s infinite; }
    .titlebar-title { font-size: 13px; font-weight: 500; color: #e2e8f0; }
    .titlebar-sub { font-size: 11px; color: #64748b; font-family: 'JetBrains Mono', monospace; }

    .body { display: flex; flex-direction: column; height: calc(100vh - 38px); }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: #1e2230;
      border-bottom: 1px solid #1e2230;
      flex-shrink: 0;
    }
    .stat {
      background: #111318;
      padding: 12px 16px;
    }
    .stat-label { font-size: 10px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 500; color: #00d4aa; }

    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
    }
    .log-container::-webkit-scrollbar { width: 4px; }
    .log-container::-webkit-scrollbar-track { background: #111318; }
    .log-container::-webkit-scrollbar-thumb { background: #1e2230; border-radius: 2px; }

    .log-line { display: flex; gap: 12px; }
    .log-ts { color: #4a5568; flex-shrink: 0; }
    .log-text { color: #94a3b8; word-break: break-all; }
    .log-text.info  { color: #94a3b8; }
    .log-text.warn  { color: #ffa502; }
    .log-text.error { color: #ff4757; }
    .log-text.success { color: #00d4aa; }

    .footer {
      border-top: 1px solid #1e2230;
      background: #111318;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .footer-left { font-size: 11px; color: #64748b; font-family: 'JetBrains Mono', monospace; }
    .open-btn {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 6px;
      background: #00d4aa;
      color: #0a0b0e;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
    }
    .open-btn:hover { background: #00eebf; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-left">
      <span class="dot" id="statusDot"></span>
      <span class="titlebar-title">MEV Terminal</span>
      <span class="titlebar-sub" id="wsStatus">ws://localhost:8765</span>
    </div>
  </div>

  <div class="body">
    <div class="stats">
      <div class="stat">
        <div class="stat-label">状态</div>
        <div class="stat-value" id="runnerStatus">启动中...</div>
      </div>
      <div class="stat">
        <div class="stat-label">日志条数</div>
        <div class="stat-value" id="logCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">运行时间</div>
        <div class="stat-value" id="uptime">0s</div>
      </div>
    </div>

    <div class="log-container" id="logContainer">
      <div class="log-line">
        <span class="log-ts">--:--:--</span>
        <span class="log-text info">MEV Terminal 正在启动...</span>
      </div>
    </div>

    <div class="footer">
      <span class="footer-left" id="footerStatus">Runner 运行中 · 等待 Web 连接</span>
      <button class="open-btn" onclick="openWeb()">打开面板 →</button>
    </div>
  </div>

  <script>
    const logContainer = document.getElementById('logContainer')
    const logCountEl = document.getElementById('logCount')
    const runnerStatusEl = document.getElementById('runnerStatus')
    const uptimeEl = document.getElementById('uptime')
    let logCount = 0
    const startTime = Date.now()

    // Uptime counter
    setInterval(() => {
      const s = Math.floor((Date.now() - startTime) / 1000)
      if (s < 60) uptimeEl.textContent = s + 's'
      else if (s < 3600) uptimeEl.textContent = Math.floor(s/60) + 'm ' + (s%60) + 's'
      else uptimeEl.textContent = Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm'
    }, 1000)

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString('zh-CN', { hour12: false })
    }

    function stripAnsi(str) {
      return str.replace(/\x1B\[[0-9;]*m/g, '')
    }

    const footerStatusEl = document.getElementById('footerStatus')
    let webConnected = false

    function updateFooter() {
      footerStatusEl.textContent = webConnected
        ? 'Runner 运行中 · Web 已连接 ✓'
        : 'Runner 运行中 · 等待 Web 连接'
      footerStatusEl.style.color = webConnected ? '#00d4aa' : '#64748b'
    }

    function addLog(line) {
      logCount++
      logCountEl.textContent = logCount

      const stripped = stripAnsi(line.text)
      if (!stripped.trim()) return

      // Detect WS client connect/disconnect from log messages
      if (stripped.includes('客户端已连接')) {
        webConnected = true
        updateFooter()
      } else if (stripped.includes('客户端断开') && stripped.includes('当前连接数: 0')) {
        webConnected = false
        updateFooter()
      }

      const div = document.createElement('div')
      div.className = 'log-line'

      let levelClass = line.level
      if (stripped.includes('✓') || stripped.includes('已连接') || stripped.includes('成功')) levelClass = 'success'

      div.innerHTML = `
        <span class="log-ts">${formatTime(line.ts)}</span>
        <span class="log-text ${levelClass}">${stripped}</span>
      `
      logContainer.appendChild(div)
      logContainer.scrollTop = logContainer.scrollHeight

      if (stripped.includes('监听')) {
        runnerStatusEl.textContent = '运行中'
        document.getElementById('statusDot').style.background = '#00d4aa'
      }
    }

    // Listen for logs from main process
    if (window.mevbot) {
      window.mevbot.onLog(addLog)
    }

    function openWeb() {
      if (window.mevbot?.openExternal) {
        window.mevbot.openExternal('https://mevbot.qianyubtc.com')
      }
    }
  </script>
</body>
</html>
